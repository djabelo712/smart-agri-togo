name: Daily Weather Logger

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill full history from 2015-01-01?"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  collect-weather:
    name: Collect Daily Weather Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Create data directories
        run: mkdir -p data/weather/processed data/weather/raw

      - name: Run weather logger
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python software/data_logger/weather_logger.py --once --backfill
          else
            python software/data_logger/weather_logger.py --once
          fi

      - name: Check for changes
        id: changes
        run: |
          git add data/weather/processed/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new data today."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New weather data collected."
            git diff --cached --name-only
          fi

      - name: Commit and push new data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "SmartFarm Bot"
          git config user.email "bot@smartfarmtogo.org"
          git commit -m "data: daily weather update $(date -u +'%Y-%m-%d') [automated]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log result
        run: |
          echo "Run completed at $(date -u)"
          ls -lh data/weather/processed/ 2>/dev/null || echo "No files yet"
